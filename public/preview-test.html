<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미리보기 테스트</title>
<style>
  body { font-family: sans-serif; display: flex; gap: 20px; padding: 20px; }
  .left { flex: 1; }
  .right { width: 420px; }
  button { display: block; margin: 8px 0; padding: 10px 20px; font-size: 14px; cursor: pointer; }
  .phone-frame {
    width: 390px; min-width: 390px; height: 844px;
    border-radius: 36px; border: 3px solid #333;
    background: #fff; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    transform: scale(0.65); transform-origin: top center;
  }
  img { display: none; }
  #status { margin-top: 10px; font-size: 13px; color: #666; }
</style>
</head>
<body>
<div class="left">
  <h2>미리보기 테스트</h2>
  <button onclick="testImage()">1. 테스트 이미지 로드 (플레이스홀더)</button>
  <button onclick="testColor()">2. 빨간색 사각형 이미지 로드</button>
  <button onclick="testDataURI()">3. data URI 직접 주입</button>
  <button onclick="testDisplay()">4. display:block 만 토글</button>
  <div id="status">상태: 대기 중</div>
</div>
<div class="right">
  <div class="phone-frame">
    <img id="previewFrame" style="width:390px;height:844px;border:none;object-fit:contain;" alt="미리보기">
  </div>
</div>

<script>
const img = document.getElementById('previewFrame');
const status = document.getElementById('status');

function log(msg) {
  status.textContent = '상태: ' + msg;
  console.log(msg);
}

// 2. 선명한 빨간 사각형 data URI
function testColor() {
  log('테스트2: 빨간색 사각형 이미지 로드...');
  const canvas = document.createElement('canvas');
  canvas.width = 390;
  canvas.height = 844;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#FF0000';
  ctx.fillRect(0, 0, 390, 844);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = '30px sans-serif';
  ctx.fillText('테스트 이미지', 80, 422);
  img.style.display = 'block';
  img.src = canvas.toDataURL();
}

// 3. data URI 직접 확인
function testDataURI() {
  log('테스트3: 하늘색 data URI 직접 주입...');
  img.style.display = 'block';
  img.src = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844"><rect width="390" height="844" fill="#4A90D9"/><text x="195" y="422" text-anchor="middle" fill="white" font-size="24" font-family="sans-serif">SVG 직접 주입 테스트</text></svg>');
}

// 4. display만 토글
function testDisplay() {
  if (img.style.display === 'none') {
    img.style.display = 'block';
    log('display: block 으로 변경 (이미지 src 없음)');
  } else {
    img.style.display = 'none';
    log('display: none 으로 변경');
  }
}

img.addEventListener('load', () => log('이미지 로드 성공!'));
img.addEventListener('error', () => log('이미지 로드 실패!'));
</script>
</body>
